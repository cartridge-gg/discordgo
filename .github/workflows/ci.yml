on:
  push:
  pull_request:

name: CI

jobs:
  build-libdave:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Code
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - id: cache-key
        run: echo "key=libdave-${{ runner.os }}-${{ hashFiles('dave/libdave/**') }}" >> "$GITHUB_OUTPUT"
      - name: Restore libdave
        id: cache-libdave
        uses: actions/cache@v3
        with:
          path: dave/libdave/cpp/build
          key: ${{ steps.cache-key.outputs.key }}
      - name: Build libdave
        if: steps.cache-libdave.outputs.cache-hit != 'true'
        run: |
          cd dave/libdave/cpp
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          make BUILD_TYPE=Release

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.22'
      - name: Code
        uses: actions/checkout@v3
      - name: Check diff between gofmt and code
        run: diff <(gofmt -d .) <(echo -n)

  test:
    runs-on: ubuntu-latest
    needs: build-libdave
    strategy:
      matrix:
        go-version: ['1.22']
    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go-version }}
      - name: Code
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Restore libdave
        uses: actions/cache@v3
        with:
          path: dave/libdave/cpp/build
          key: ${{ needs.build-libdave.outputs.cache-key }}
      - name: Test
        run: |
          LIBDAVE_BUILD="$PWD/dave/libdave/cpp/build"
          VCPKG_LIBDIR="$(find "$LIBDAVE_BUILD/vcpkg_installed" -maxdepth 2 -name lib -type d | head -1)"
          VCPKG_LIBS="$(find "$VCPKG_LIBDIR" -maxdepth 1 -name '*.a' | sort | tr '\n' ' ')"
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$PWD/dave/libdave/cpp/includes" \
          CGO_LDFLAGS="-L$VCPKG_LIBDIR $LIBDAVE_BUILD/libdave.a -Wl,--start-group $VCPKG_LIBS -Wl,--end-group -lstdc++ -lm -ldl -lpthread" \
            go test -vet=off -v -race ./...

  lint:
    runs-on: ubuntu-latest
    needs: build-libdave
    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.22'
      - name: Code
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Restore libdave
        uses: actions/cache@v3
        with:
          path: dave/libdave/cpp/build
          key: ${{ needs.build-libdave.outputs.cache-key }}

      - name: Compile packages
        run: |
          LIBDAVE_BUILD="$PWD/dave/libdave/cpp/build"
          VCPKG_LIBDIR="$(find "$LIBDAVE_BUILD/vcpkg_installed" -maxdepth 2 -name lib -type d | head -1)"
          VCPKG_LIBS="$(find "$VCPKG_LIBDIR" -maxdepth 1 -name '*.a' | sort | tr '\n' ' ')"
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I$PWD/dave/libdave/cpp/includes" \
          CGO_LDFLAGS="-L$VCPKG_LIBDIR $LIBDAVE_BUILD/libdave.a -Wl,--start-group $VCPKG_LIBS -Wl,--end-group -lstdc++ -lm -ldl -lpthread" \
            go test -vet=off -run '^$' ./...
